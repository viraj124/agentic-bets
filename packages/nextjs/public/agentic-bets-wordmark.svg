  <!-- Decorative floating elements - left -->
  <circle cx="180" cy="140" r="40" fill="#F472B6" fill-opacity="0.06" />
  <circle cx="260" cy="100" r="12" fill="#F472B6" fill-opacity="0.18" />
  <circle cx="220" cy="280" r="10" fill="#34D399" fill-opacity="0.2" />
  <rect x="300" y="260" width="22" height="22" rx="5" transform="rotate(18 300 260)" fill="#8B5CF6" fill-opacity="0.12" />
  <circle cx="120" cy="300" r="6" fill="#8B5CF6" fill-opacity="0.2" />
  <path d="M140 200H280" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-opacity="0.3" />

  <!-- Decorative floating elements - right -->
  <circle cx="1260" cy="140" r="44" fill="#8B5CF6" fill-opacity="0.06" />
  <circle cx="1200" cy="280" r="14" fill="#34D399" fill-opacity="0.16" />
