    <circle cx="800" cy="80" r="1.2" /><circle cx="880" cy="80" r="1.2" /><circle cx="960" cy="80" r="1.2" />
    <circle cx="1040" cy="80" r="1.2" /><circle cx="1120" cy="80" r="1.2" /><circle cx="1200" cy="80" r="1.2" />
    <circle cx="1280" cy="80" r="1.2" /><circle cx="1360" cy="80" r="1.2" />
    <circle cx="80" cy="160" r="1.2" /><circle cx="160" cy="160" r="1.2" /><circle cx="240" cy="160" r="1.2" />
    <circle cx="320" cy="160" r="1.2" /><circle cx="400" cy="160" r="1.2" /><circle cx="480" cy="160" r="1.2" />
    <circle cx="560" cy="160" r="1.2" /><circle cx="640" cy="160" r="1.2" /><circle cx="720" cy="160" r="1.2" />
    <circle cx="800" cy="160" r="1.2" /><circle cx="880" cy="160" r="1.2" /><circle cx="960" cy="160" r="1.2" />
    <circle cx="1040" cy="160" r="1.2" /><circle cx="1120" cy="160" r="1.2" /><circle cx="1200" cy="160" r="1.2" />
    <circle cx="1280" cy="160" r="1.2" /><circle cx="1360" cy="160" r="1.2" />
    <circle cx="80" cy="240" r="1.2" /><circle cx="160" cy="240" r="1.2" /><circle cx="240" cy="240" r="1.2" />
    <circle cx="320" cy="240" r="1.2" /><circle cx="400" cy="240" r="1.2" /><circle cx="480" cy="240" r="1.2" />
    <circle cx="560" cy="240" r="1.2" /><circle cx="640" cy="240" r="1.2" /><circle cx="720" cy="240" r="1.2" />
    <circle cx="800" cy="240" r="1.2" /><circle cx="880" cy="240" r="1.2" /><circle cx="960" cy="240" r="1.2" />
    <circle cx="1040" cy="240" r="1.2" /><circle cx="1120" cy="240" r="1.2" /><circle cx="1200" cy="240" r="1.2" />
    <circle cx="1280" cy="240" r="1.2" /><circle cx="1360" cy="240" r="1.2" />
    <circle cx="80" cy="320" r="1.2" /><circle cx="160" cy="320" r="1.2" /><circle cx="240" cy="320" r="1.2" />
