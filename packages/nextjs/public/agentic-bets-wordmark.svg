  <path d="M1160 200H1300" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-opacity="0.3" />

  <!-- "A" logo mark -->
  <g transform="translate(490 120) scale(2.2)">
    <path d="M16 0L32 44H23.5L20 34H12L8.5 44H0L16 0Z" fill="url(#a-fill)" />
    <path d="M13.5 28H18.5L16 20.5L13.5 28Z" fill="#111827" />
    <circle cx="33" cy="6" r="3.7" fill="#F472B6" />
    <circle cx="1.5" cy="36" r="2.6" fill="#34D399" fill-opacity="0.95" />
  </g>

  <!-- "gentic Bets" text -->
  <text
    x="570"
    y="228"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="86"
    font-weight="800"
    letter-spacing="-2.8"
  >
    <tspan fill="#F1F5F9">gentic </tspan>
    <tspan fill="#8B5CF6">Bets</tspan>
  </text>

  <!-- Tagline -->
  <text
    x="720"
    y="280"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="22"
    font-weight="400"
    fill="#94A3B8"
    text-anchor="middle"
    letter-spacing="0.5"
