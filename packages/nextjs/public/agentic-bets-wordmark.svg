    <circle cx="560" cy="320" r="1.2" /><circle cx="640" cy="320" r="1.2" /><circle cx="720" cy="320" r="1.2" />
    <circle cx="800" cy="320" r="1.2" /><circle cx="880" cy="320" r="1.2" /><circle cx="960" cy="320" r="1.2" />
    <circle cx="1040" cy="320" r="1.2" /><circle cx="1120" cy="320" r="1.2" /><circle cx="1200" cy="320" r="1.2" />
    <circle cx="1280" cy="320" r="1.2" /><circle cx="1360" cy="320" r="1.2" />
